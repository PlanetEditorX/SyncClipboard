name: Build and Publish Docker Image to Docker Hub

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare Docker build context
        run: |
          rm -rf docker-context || true
          mkdir -p docker-context
          rsync -a --delete --exclude '.git' --exclude '.venv' --exclude '.github' --exclude 'docker-context' ./ docker-context/

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: docker-context/
          file: docker-context/Docker/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/syncclipboard-server:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/syncclipboard-server:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max